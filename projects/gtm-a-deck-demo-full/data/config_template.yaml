    title: "GM-01 Positioning Statement | A-Deck 市场定位"
    subtitle: "For 产品/营销团队 | 结构化定位链路"
    content:
      target: "产品团队与营销团队\n(200-10K人规模企业)"
      problem: "PPT制作慢且风格不一致\n手工协作成本高"
      product: "A-Deck\n企业级PPT生成平台"
      differentiator: "模板智能 + AI生成\n品牌规范自动约束"
      category: "Enterprise PPT Automation"

  gm_02_value_pyramid:
    title: "GM-02 Value Pyramid | 价值金字塔"
    subtitle: "For 高管/投资者 | 三层价值递进"
    content:
      tiers:
        - label: "Strategic Value"
          desc: "企业级品牌竞争力与规模化内容运营"
          callouts:
            - "品牌一致性带来客户信赖度↑25%"
            - "内容运营效率成为竞争壁垒"
        - label: "Business Value"
          desc: "人力成本↓50%，提案周期↓80%，合规↑100%"
          callouts:
            - "年省人力成本200K+/团队"
            - "提案赢率↑15%"
            - "品牌合规审核自动化"
        - label: "Functional Value"
          desc: "AI生成内容、品牌模板、多人协作、审批流程"
          callouts:
            - "10分钟生成专业PPT"
            - "企业模板库 + 品牌锁定"
            - "实时多人协作编辑"

  gm_03_before_after_comparison:
    title: "GM-03 Before / After | 现状 vs 未来"
    subtitle: "For 销售/决策者 | 痛点与价值可视化"
    content:
      before:
        label: "Before — 传统方式"
        cards:
          - title: "制作耗时"
            desc: "每份PPT平均15小时，反复改稿"
          - title: "风格不一致"
            desc: "各部门各自为战，品牌形象混乱"
          - title: "协作低效"
            desc: "文件邮件传递，版本管理混乱"
          - title: "合规风险"
            desc: "敏感信息泄露、品牌滥用难追溯"
      after:
        label: "After — 使用 A-Deck"
        cards:
          - title: "AI 快速生成"
            desc: "10分钟完成专业级PPT"
            delta: "↓80% 时间"
          - title: "品牌统一"
            desc: "模板锁定 + 规范自动校验"
            delta: "100% 合规"
          - title: "实时协作"
            desc: "多人同时编辑，审批流自动化"
            delta: "↑3x 效率"
          - title: "安全可控"
            desc: "权限管理 + 审计日志 + SSO"
            delta: "零泄露"

